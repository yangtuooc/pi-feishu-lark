name: Publish npm

on:
  # Release Please 推送 v* tag 时触发（主路径，最可靠）
  push:
    tags:
      - "v*"
  # 兼容 release 事件（若平台发出）
  release:
    types: [published]
  # 手动回放 / 热修
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.4.1)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write # npm trusted publishing / provenance

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Resolve tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            # push tags
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "::error::invalid tag: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "resolved tag=$TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@xjuai"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify package version matches tag
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          TAG_VERSION="${{ steps.meta.outputs.version }}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG tag_version=$TAG_VERSION package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Publish
        # 已发布过的版本直接成功跳过，避免 release + tag 双触发失败
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view "@xjuai/pi-feishu-lark@${VERSION}" version >/dev/null 2>&1; then
            echo "version ${VERSION} already on npm, skip publish"
            exit 0
          fi
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
