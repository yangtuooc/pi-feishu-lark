name: Publish npm

on:
  # release-please 合并后会创建 GitHub Release / tag，再触发发布
  release:
    types: [published]
  # 也允许手动发布指定 tag（回放/热修）
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.4.1)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write # npm trusted publishing / provenance

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          # scope 包发布到 npm
          scope: "@xjuai"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify package version matches tag
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG tag_version=$TAG_VERSION package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public --provenance
        env:
          # 优先用 OIDC trusted publishing；若未配置，回退 NPM_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
